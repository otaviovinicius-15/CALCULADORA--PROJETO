name: CD Release and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build release package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare release folder
        run: |
          rm -rf release
          mkdir release
          cp index.html style.css *.js release/

      - name: Create zip archive
        run: |
          cd release
          zip -r ../calculadora-release-${GITHUB_RUN_NUMBER}.zip .

      - name: Upload release folder
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-release-folder
          path: release

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-release-zip
          path: calculadora-release-${GITHUB_RUN_NUMBER}.zip

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download release zip
        uses: actions/download-artifact@v4
        with:
          name: calculadora-release-zip
          path: ./release-artifact

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Release automatizada do projeto Calculadora.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-artifact/calculadora-release-${{ github.run_number }}.zip
          asset_name: calculadora-${{ github.ref_name }}.zip
          asset_content_type: application/zip

  deploy:
    name: Deploy to Netlify
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download release folder
        uses: actions/download-artifact@v4
        with:
          name: calculadora-release-folder
          path: ./release

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: netlify deploy --dir=release --prod --site=$NETLIFY_SITE_ID
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
